<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2026 世界杯 32 强动态对阵表</title>
    <meta
      name="description"
      content="2026 世界杯 32 强动态对阵、小组第三实时排名与淘汰赛路径图"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f766e'/%3E%3Ccircle cx='32' cy='32' r='18' fill='white'/%3E%3Cpath d='M22 22h20v20H22z' fill='none' stroke='%230f766e' stroke-width='5'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">FIFA World Cup 2026</p>
        <h1>32 强动态对阵表</h1>
        <p class="subtitle">小组第三实时排名 + 官方第三名分配矩阵</p>
      </div>
      <div class="controls" aria-label="数据刷新控制">
        <button id="refreshBtn" type="button">刷新</button>
        <label class="switch">
          <input id="autoRefresh" type="checkbox" checked />
          <span>自动刷新</span>
        </label>
        <select id="refreshInterval" aria-label="自动刷新间隔">
          <option value="900000">15 分钟</option>
          <option value="1800000">30 分钟</option>
          <option value="3600000" selected>1 小时</option>
        </select>
        <button id="copyLinkBtn" type="button">复制链接</button>
        <button id="qrBtn" type="button">二维码</button>
      </div>
    </header>

    <main>
      <section class="status-grid" aria-label="数据状态">
        <div class="status-item">
          <span>数据状态</span>
          <strong id="loadState">加载中</strong>
        </div>
        <div class="status-item">
          <span>源修订</span>
          <strong id="revisionState">--</strong>
        </div>
        <div class="status-item">
          <span>当前第三名组合</span>
          <strong id="comboState">--</strong>
        </div>
        <div class="status-item">
          <span>小组完成</span>
          <strong id="completeState">--</strong>
        </div>
      </section>

      <p id="notice" class="notice" role="status"></p>

      <section id="sharePanel" class="share-panel" hidden>
        <div>
          <p class="eyebrow">Share</p>
          <h2>手机扫码打开</h2>
          <input id="shareUrl" type="text" readonly aria-label="分享链接" />
          <div class="share-actions">
            <button id="copyShareBtn" type="button">复制链接</button>
            <button id="closeShareBtn" type="button">关闭</button>
          </div>
        </div>
        <img id="qrImage" alt="网页二维码" width="164" height="164" />
      </section>

      <section class="split">
        <div class="section-block">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Round of 32</p>
              <h2>32 强对阵</h2>
            </div>
            <span id="matrixState" class="badge">矩阵待加载</span>
          </div>
          <div id="round32" class="match-grid" aria-live="polite"></div>
        </div>

        <aside class="section-block">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Best Third-placed Teams</p>
              <h2>小组第三排名</h2>
            </div>
            <div class="badge-row">
              <span class="badge locked">蓝色=已锁定</span>
              <span class="badge qualify">前 8 晋级</span>
            </div>
          </div>
          <div id="thirdRanking" class="table-wrap" aria-live="polite"></div>
        </aside>
      </section>

      <section class="section-block full">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Knockout Path</p>
            <h2>淘汰赛路径图</h2>
          </div>
          <span class="badge warn">手机端可左右滑动</span>
        </div>
        <div id="bracket" class="bracket-grid" aria-live="polite"></div>
      </section>

      <section class="section-block full">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Group Tables</p>
            <h2>小组积分</h2>
          </div>
        </div>
        <div id="groups" class="groups-grid" aria-live="polite"></div>
      </section>

      <section class="source-strip" aria-label="数据来源">
        <a href="https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026" target="_blank" rel="noreferrer">FIFA 赛事页</a>
        <a href="https://digitalhub.fifa.com/m/636f5c9c6f29771f/original/FWC2026_regulations_EN.pdf" target="_blank" rel="noreferrer">FIFA 竞赛规程 PDF</a>
        <a href="https://en.wikipedia.org/wiki/2026_FIFA_World_Cup" target="_blank" rel="noreferrer">Wikipedia 总页面</a>
        <a href="https://en.wikipedia.org/wiki/2026_FIFA_World_Cup_knockout_stage" target="_blank" rel="noreferrer">Wikipedia 淘汰赛页</a>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
